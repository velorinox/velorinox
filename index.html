<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Questions</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #f76a6a;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --q-bg: #14141e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1030 100%);
    border-bottom: 1px solid var(--border);
    padding: 48px 24px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 400px; height: 200px;
    background: radial-gradient(ellipse, rgba(124,106,247,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  header h1 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 800;
    letter-spacing: -1px;
    color: #fff;
  }
  header h1 span { color: var(--accent); }
  header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 0.95rem;
    font-family: 'DM Mono', monospace;
  }

  /* Search */
  .search-wrap {
    max-width: 680px;
    margin: 32px auto 0;
    padding: 0 20px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    padding: 14px 20px 14px 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap .icon {
    position: absolute;
    left: 36px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
  }

  /* Main */
  main {
    max-width: 820px;
    margin: 48px auto 0;
    padding: 0 20px;
  }

  /* Chapter */
  .chapter {
    margin-bottom: 40px;
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .chapter-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
  }
  .chapter-header:hover { background: #16161f; }

  .ch-num {
    background: var(--accent);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    padding: 4px 10px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .ch-num.red { background: var(--accent2); }

  .ch-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: #fff;
    flex: 1;
  }

  .ch-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .ch-arrow {
    color: var(--muted);
    font-size: 0.9rem;
    transition: transform 0.3s;
  }
  .chapter.open .ch-arrow { transform: rotate(180deg); }

  /* Questions list */
  .questions {
    display: none;
    background: var(--q-bg);
  }
  .chapter.open .questions { display: block; }

  .q-item {
    display: flex;
    gap: 16px;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .q-item:last-child { border-bottom: none; }
  .q-item:hover { background: #17171f; }

  .q-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--accent);
    font-weight: 500;
    min-width: 28px;
    padding-top: 2px;
  }

  .q-text {
    font-size: 0.95rem;
    line-height: 1.65;
    color: var(--text);
  }

  .q-text .sub {
    display: block;
    margin-top: 6px;
    padding-left: 16px;
    color: #aaa;
    font-size: 0.9rem;
    line-height: 1.7;
  }

  /* No results */
  #no-results {
    display: none;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 28px auto 0;
    max-width: 680px;
    padding: 0 20px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 24px;
    text-align: center;
  }
  .stat-val {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--accent);
  }
  .stat-label {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }

  @media (max-width: 500px) {
    .ch-title { font-size: 0.95rem; }
    .q-item { padding: 14px 16px; }
    .chapter-header { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <h1>Important <span>Questions</span></h1>
  <p>Class 9 · Science &amp; Physics · Exam Prep</p>
</header>

<div class="stats">
  <div class="stat"><div class="stat-val" id="total-q">0</div><div class="stat-label">Total Questions</div></div>
  <div class="stat"><div class="stat-val" id="total-ch">0</div><div class="stat-label">Chapters</div></div>
</div>

<div class="search-wrap">
  <span class="icon">🔍</span>
  <input type="text" id="search" placeholder="Search questions..." oninput="handleSearch()" />
</div>

<main id="main"></main>
<div id="no-results">No questions found for "<span id="search-term"></span>"</div>

<script>
const chapters = [
  {
    num: "Ch 1",
    title: "Matter in Our Surroundings",
    color: "purple",
    questions: [
      {
        text: "What is meant by pure substance?"
      },
      {
        text: "Explain the following:",
        subs: [
          "(a) Saturated solution",
          "(b) Pure substance",
          "(c) Colloid",
          "(d) Suspension"
        ]
      },
      {
        text: "How would you confirm that a colourless liquid given to you is pure water?"
      }
    ]
  },
  {
    num: "Ch 3",
    title: "Atoms and Molecules",
    color: "red",
    questions: [
      { text: "All questions from this chapter are included." }
    ]
  },
  {
    num: "Ch 4",
    title: "Structure of the Atom",
    color: "purple",
    questions: [
      { text: "What are canal rays?" },
      { text: "Describe the Thomson model of the atom." },
      { text: "What are the limitations of the Thomson model?" },
      { text: "Draw a labelled diagram of the Thomson model of the atom." },
      { text: "Describe Rutherford's alpha particle scattering experiment." },
      { text: "What do you think would be the observation of the alpha particle scattering experiment if a foil of metal other than gold was used?" },
      { text: "What are the limitations of Rutherford's model of the atom?" },
      { text: "Describe Bohr's model of the atom." },
      { text: "Name the sub-atomic particles of an atom." },
      {
        text: "Explain with examples:",
        subs: [
          "(a) Atomic number",
          "(b) Mass number",
          "(c) Isotopes",
          "(d) Isobars"
        ]
      }
    ]
  },
  {
    num: "Ch 5",
    title: "The Fundamental Unit of Life",
    color: "purple",
    questions: [
      { text: "Draw a labelled diagram of a neuron." },
      { text: "Draw labelled diagrams of a plant cell and an animal cell." },
      { text: "Which organelle is known as the powerhouse of the cell?" },
      { text: "Who discovered the cell and how?" },
      { text: "Why is the cell called the structural and fundamental unit of life?" },
      { text: "How are plant cells different from animal cells?" }
    ]
  },
  {
    num: "Ch 6",
    title: "Tissues",
    color: "red",
    questions: [
      { text: "All questions from this chapter are included." }
    ]
  },
  {
    num: "Ch 7",
    title: "Motion",
    color: "purple",
    questions: [
      { text: "Explain why some of the leaves may get detached from a tree when we shake its branches vigorously." },
      { text: "Why do we fall in the forward direction when a moving bus brakes to a stop, and fall backwards when it accelerates from rest?" }
    ]
  },
  {
    num: "Ch 9",
    title: "Gravitation",
    color: "red",
    questions: [
      { text: "All questions from this chapter are included." }
    ]
  },
  {
    num: "Ch 10",
    title: "Work, Force and Energy",
    color: "red",
    questions: [
      { text: "All questions from this chapter are included." }
    ]
  },
  {
    num: "Ch 11",
    title: "Sound",
    color: "purple",
    questions: [
      { text: "Why is a sound wave called a longitudinal wave?" },
      { text: "Flash and thunder are produced simultaneously. But thunder is heard a few seconds after the flash is seen. Why?" },
      { text: "How is ultrasound used for cleaning?" },
      { text: "What is reverberation? How is it reduced?" },
      { text: "Explain how sound is produced by your school bell." },
      { text: "What is the audible range of the average human ear?" }
    ]
  },
  {
    num: "Ch 12",
    title: "Improvement in Food Resources",
    color: "purple",
    questions: [
      { text: "How are fish obtained?" },
      { text: "What is genetic manipulation?" },
      { text: "What are the benefits of cattle farming?" }
    ]
  }
];

// Count totals
let totalQ = 0;
chapters.forEach(ch => totalQ += ch.questions.length);
document.getElementById('total-q').textContent = totalQ;
document.getElementById('total-ch').textContent = chapters.length;

// Render
function render(data) {
  const main = document.getElementById('main');
  main.innerHTML = '';
  if (data.length === 0) {
    document.getElementById('no-results').style.display = 'block';
    return;
  }
  document.getElementById('no-results').style.display = 'none';

  data.forEach((ch, ci) => {
    const div = document.createElement('div');
    div.className = 'chapter open';
    div.style.animationDelay = (ci * 0.07) + 's';

    const qs = ch.questions.map((q, qi) => {
      const subs = q.subs ? q.subs.map(s => `<span class="sub">${s}</span>`).join('') : '';
      return `<div class="q-item">
        <span class="q-num">Q${qi+1}</span>
        <span class="q-text">${q.text}${subs}</span>
      </div>`;
    }).join('');

    div.innerHTML = `
      <div class="chapter-header" onclick="toggle(this.parentElement)">
        <span class="ch-num ${ch.color === 'red' ? 'red' : ''}">${ch.num}</span>
        <span class="ch-title">${ch.title}</span>
        <span class="ch-count">${ch.questions.length}Q</span>
        <span class="ch-arrow">▼</span>
      </div>
      <div class="questions">${qs}</div>`;

    main.appendChild(div);
  });
}

function toggle(el) {
  el.classList.toggle('open');
}

function handleSearch() {
  const val = document.getElementById('search').value.trim().toLowerCase();
  document.getElementById('search-term').textContent = val;

  if (!val) { render(chapters); return; }

  const filtered = chapters.map(ch => {
    const qs = ch.questions.filter(q => {
      if (q.text.toLowerCase().includes(val)) return true;
      if (q.subs && q.subs.some(s => s.toLowerCase().includes(val))) return true;
      return false;
    });
    return qs.length ? { ...ch, questions: qs } : null;
  }).filter(Boolean);

  render(filtered);
}

render(chapters);
</script>
</body>
</html>
