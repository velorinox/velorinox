<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nox</title>
  <meta name="theme-color" content="#120000" />
  <meta name="description" content="Nox – Links & social presence" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@3/tsparticles.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanilla-tilt@1.8.1/dist/vanilla-tilt.min.js"></script>

  <style>
    :root {
      --card-width: 380px;
      --glass-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --muted: rgba(255,255,255,0.72);
      --ig: #E1306C;
      --yt: #FF0000;
      --x: #FFFFFF;
      --parallax-x: 0px;
      --parallax-y: 0px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      background: #0b0000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    #tsparticles { position: fixed; inset: 0; z-index: 0; }

    .nebula {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(700px 400px at 10% 20%, rgba(110,0,0,.55), transparent 15%),
                  radial-gradient(600px 350px at 90% 80%, rgba(45,0,0,.55), transparent 12%),
                  linear-gradient(180deg, #080000, #0c0000 40%, #050000);
    }

    .nebula::before, .nebula::after {
      content: "";
      position: absolute;
      inset: -20%;
      filter: blur(70px) opacity(.9);
      animation: floaty 30s linear infinite;
    }

    .nebula::before {
      background: radial-gradient(closest-side, rgba(255,60,60,.25), transparent 35%);
      transform: translate(var(--parallax-x), var(--parallax-y));
    }

    .nebula::after {
      background: radial-gradient(closest-side, rgba(200,10,40,.18), transparent 30%);
      animation-direction: reverse;
      transform: translate(calc(var(--parallax-x) * -0.7), calc(var(--parallax-y) * -0.7));
    }

    @keyframes floaty {
      0% { transform: translate(-10%, 0); }
      50% { transform: translate(10%, 4%); }
      100% { transform: translate(-10%, 0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255,60,60,0.4); }
      70%  { box-shadow: 0 0 0 12px rgba(255,60,60,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,60,60,0); }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.04); }
    }

    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64"><filter id="n"><feTurbulence baseFrequency="0.9"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.04"/></svg>');
    }

    .wrap {
      z-index: 2;
      width: 100%;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }

    .card {
      width: min(92%, var(--card-width));
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.02));
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 28px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 30px rgba(0,0,0,.7);
      text-align: center;
      position: relative;
      opacity: 0;
      animation: fadeInUp 1.2s ease-out 0.3s forwards;
    }

    .card .tab {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 6px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.06);
      backdrop-filter: blur(4px);
    }

    .avatar {
      width: 96px;
      height: 96px;
      margin: 6px auto 12px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,.06);
      animation: pulse 4s infinite cubic-bezier(0.4, 0, 0.6, 1), breathe 8s infinite ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,60,60,0.15);
      transition: box-shadow 0.3s, transform 0.3s;
    }

    .avatar:hover {
      box-shadow: 0 0 25px rgba(255,60,60,0.6);
      transform: scale(1.05);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 1.9rem;
      margin: 6px 0;
      opacity: 0;
      animation: fadeIn 1s ease-out 0.8s forwards;
    }

    .subtitle {
      color: rgba(255,255,255,.75);
      margin-bottom: 18px;
      opacity: 0;
      animation: fadeIn 1s ease-out 1s forwards;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 10px;
    }

    .btn {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      color: #fff;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
      backdrop-filter: blur(8px);
      transition: all .3s ease;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeIn 0.8s ease-out forwards;
    }

    .btn:nth-child(1) { animation-delay: 1.2s; }
    .btn:nth-child(2) { animation-delay: 1.35s; }
    .btn:nth-child(3) { animation-delay: 1.5s; }

    .btn i { font-size: 1.35rem; }

    .btn:hover {
      transform: translateY(-4px) scale(1.03);
      background: rgba(255,255,255,.09);
    }

    .btn.ig:hover { background: rgba(225,48,108,.15); box-shadow: 0 0 30px rgba(225,48,108,.35); }
    .btn.x:hover  { background: rgba(255,255,255,.12); box-shadow: 0 0 30px rgba(255,255,255,.3); }
    .btn.gh:hover { background: rgba(255,255,255,.12); box-shadow: 0 0 30px rgba(255,255,255,.3); }

    .footer {
      margin-top: 24px;
      font-size: .78rem;
      color: rgba(255,255,255,.55);
      opacity: 0;
      animation: fadeIn 1s ease-out 1.8s forwards;
    }
  </style>
</head>
<body>

  <div id="tsparticles"></div>
  <div class="nebula"></div>
  <div class="grain"></div>

  <div class="wrap">
    <div class="card" data-tilt data-tilt-max="5" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.3">
      <div class="tab"></div>
      <div class="avatar">
        <img src="desktop-wallpaper-untitled-red-and-black-dark-red-black-aesthetic-black-and-red-phone.jpg" alt="Nox profile picture">
      </div>
      <h1>Nox</h1>
      <div class="subtitle">Links & presence</div>

      <nav class="links">
        <a class="btn ig" href="https://instagram.com/velorinox" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-instagram"></i> Instagram
        </a>
        <a class="btn x" href="https://x.com/velorinox" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-x-twitter"></i> X
        </a>
        <a class="btn gh" href="https://github.com/velorinox" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-github"></i> GitHub
        </a>
      </nav>

      <div class="footer">© Nox</div>
    </div>
  </div>

  <script>
    tsParticles.load("tsparticles", {
      background: { color: { value: "transparent" } },
      fpsLimit: 60,
      particles: {
        number: { value: 80, density: { enable: true, value_area: 800 } },
        color: { value: ["#ff3333", "#cc0000", "#990000"] },
        shape: { type: "circle" },
        opacity: { value: 0.3, random: true },
        size: { value: 2, random: { enable: true, minimumValue: 0.5 } },
        move: { enable: true, speed: 0.5, outModes: { default: "out" } }
      },
      detectRetina: true
    });

    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 50;
      const y = (e.clientY / window.innerHeight - 0.5) * 50;
      document.documentElement.style.setProperty('--parallax-x', `${x}px`);
      document.documentElement.style.setProperty('--parallax-y', `${y}px`);
    });

    VanillaTilt.init(document.querySelectorAll(".card"), { max: 5, speed: 400, glare: true, "max-glare": 0.3 });

  </script>
</body>
  </html>
